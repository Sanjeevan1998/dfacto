<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0"
  >
  <link rel="stylesheet" href="styles.css">

  <style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  font-family: "Inter", sans-serif;
  background: #e8edf5;
  color: white;
}

body {
  min-height: 100vh;
}

button,
input,
a {
  font: inherit;
}

button {
  border: none;
}

a {
  text-decoration: none;
  color: inherit;
}

.app-shell {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 28px 16px;
}

.phone {
  width: 390px;
  max-width: 100%;
  height: 844px;
  background: #000;
  border-radius: 34px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow:
    0 30px 90px rgba(0, 0, 0, 0.45),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(16px);
}

.page {
  position: absolute;
  inset: 0;
}

.screen-inner {
  height: 100%;
  overflow-y: auto;
  padding: 22px 20px 128px;
  scrollbar-width: none;
}

.screen-inner::-webkit-scrollbar {
  width: 0;
  height: 0;
}

.news-page {
  display: flex;
  flex-direction: column;
  gap: 18px;
  min-height: 100%;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 20;
  padding-bottom: 8px;
  background: transparent;
}

.topbar-title {
  margin: 0;
  font-size: 1.85rem;
  line-height: 1;
  letter-spacing: -0.03em;
  color: white;
  font-weight: 700;
}

.topbar-actions-pill {
  margin-left: auto;
  height: 44px;
  display: inline-flex;
  align-items: center;
  padding: 0 6px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.22);
  backdrop-filter: blur(16px) saturate(160%);
  -webkit-backdrop-filter: blur(16px) saturate(160%);
  box-shadow:
    inset 0 1px 1px rgba(255, 255, 255, 0.55),
    0 8px 24px rgba(31, 35, 43, 0.1);
}

.glass-pill-btn {
  width: 40px;
  height: 40px;
  background: transparent;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  cursor: pointer;
  transition:
    transform 0.24s cubic-bezier(.22, 1, .36, 1),
    background 0.24s ease;
}

.glass-pill-btn:hover {
  background: rgba(255, 255, 255, 0.12);
}

.glass-pill-btn:active {
  transform: scale(0.96);
}

.glass-pill-btn .material-symbols-outlined {
  font-size: 1.2rem;
  line-height: 1;
  color: white;
}

.pill-divider {
  width: 1px;
  height: 20px;
  background: rgba(255, 255, 255, 0.25);
  margin: 0 2px;
}

.news-search-stage {
  min-height: 46vh;
  display: flex;
  align-items: center;
  justify-content: center;
  transition:
    min-height 0.42s cubic-bezier(.22,1,.36,1),
    transform 0.42s cubic-bezier(.22,1,.36,1);
}

.news-search-stage.search-active {
  min-height: 0;
  align-items: flex-start;
  justify-content: flex-start;
}

.search-center-wrap {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
  transition:
    transform 0.42s cubic-bezier(.22,1,.36,1),
    opacity 0.32s ease;
}

.news-search-stage.search-active .search-center-wrap {
  align-items: stretch;
}

.search-stage-label {
  margin: 0;
  font-size: 1rem;
  line-height: 1.2;
  color: white;
  font-weight: 600;
  transition:
    transform 0.35s cubic-bezier(.22,1,.36,1),
    opacity 0.28s ease;
}

.search-bubble {
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 58px;
  width: 100%;
  padding: 0 16px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.22);
  backdrop-filter: blur(16px) saturate(160%);
  -webkit-backdrop-filter: blur(16px) saturate(160%);
  box-shadow:
    inset 0 1px 1px rgba(255, 255, 255, 0.55),
    0 8px 24px rgba(31, 35, 43, 0.1);
  transition:
    transform 0.42s cubic-bezier(.22,1,.36,1),
    box-shadow 0.28s ease,
    background 0.28s ease;
}

.search-bubble .material-symbols-outlined {
  font-size: 1.15rem;
  color: rgba(255, 255, 255, 0.88);
  flex-shrink: 0;
}

.search-input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: white;
  font-size: 0.95rem;
}

.search-input::placeholder {
  color: rgba(255, 255, 255, 0.55);
}

.helper-copy {
  margin: 0;
  color: rgba(255,255,255,0.72);
  font-size: 0.82rem;
  line-height: 1.45;
  text-align: center;
  max-width: 310px;
  transition:
    opacity 0.28s ease,
    transform 0.35s cubic-bezier(.22,1,.36,1);
}

.news-search-stage.search-active .helper-copy {
  text-align: left;
  max-width: none;
}

.results-section {
  opacity: 0;
  transform: translateY(22px);
  pointer-events: none;
  transition:
    opacity 0.34s ease,
    transform 0.42s cubic-bezier(.22,1,.36,1);
}

.results-section.show-results {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.results-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-bottom: 160px;
}

.news-card {
  width: 100%;
  min-height: 146px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 14px;
  text-align: left;
  border-radius: 22px;
  padding: 14px;
  cursor: pointer;
  background: rgba(255, 255, 255, 0.22);
  backdrop-filter: blur(16px) saturate(160%);
  -webkit-backdrop-filter: blur(16px) saturate(160%);
  box-shadow:
    inset 0 1px 1px rgba(255, 255, 255, 0.55),
    0 8px 24px rgba(31, 35, 43, 0.1);
  transition:
    transform 0.24s ease,
    box-shadow 0.24s ease,
    background 0.24s ease,
    opacity 0.24s ease;
  border: none;
  color: white;
}

.news-card:hover {
  transform: translateY(-1px);
  box-shadow:
    inset 0 1px 1px rgba(255, 255, 255, 0.55),
    0 12px 28px rgba(31, 35, 43, 0.16);
}

.news-card:active {
  transform: scale(0.99);
}

.news-card.hidden-card {
  display: none;
}

.news-meta {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}

.news-source {
  font-size: 0.74rem;
  font-weight: 700;
  letter-spacing: 0.03em;
  color: rgba(255, 255, 255, 0.75);
  text-transform: uppercase;
}

.news-date {
  font-size: 0.72rem;
  color: rgba(255, 255, 255, 0.6);
  white-space: nowrap;
}

.news-main {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.news-card h3 {
  margin: 0;
  font-size: 1rem;
  line-height: 1.35;
  font-weight: 600;
  color: white;
}

.news-card p {
  margin: 0;
  font-size: 0.84rem;
  line-height: 1.45;
  color: rgba(255,255,255,0.76);
}

.keyword-pill {
  width: fit-content;
  align-self: flex-end;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 0.7rem;
  font-weight: 700;
  line-height: 1;
  background: rgba(255, 255, 255, 0.14);
  color: rgba(255,255,255,0.88);
}

.results-drawer {
  position: absolute;
  left: 12px;
  right: 12px;
  bottom: 88px;
  height: 220px;
  max-height: 620px;
  background: rgba(255, 255, 255, 0.55);
  border: 1px solid rgba(255, 255, 255, 0.52);
  border-radius: 28px;
  backdrop-filter: blur(20px) saturate(165%);
  -webkit-backdrop-filter: blur(20px) saturate(165%);
  box-shadow:
    0 -10px 32px rgba(20, 25, 36, 0.1),
    inset 0 1px 0 rgba(255, 255, 255, 0.44);
  z-index: 30;
  user-select: none;
  overflow: hidden;
  transition:
    height 0.34s cubic-bezier(.22, 1, .36, 1),
    opacity 0.22s ease,
    transform 0.22s ease;
  display: flex;
  flex-direction: column;
  opacity: 1;
  transform: translateY(0);
}

.results-drawer.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(18px);
}

.results-drawer.dragging {
  transition: none;
}

.drawer-handle-zone {
  padding: 10px 0 8px;
  display: flex;
  justify-content: center;
  cursor: grab;
  flex-shrink: 0;
}

.results-drawer.dragging .drawer-handle-zone {
  cursor: grabbing;
}

.drag-line {
  width: 44px;
  height: 5px;
  border-radius: 999px;
  background: #bcc6d4;
}

.drawer-header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 14px 6px;
  gap: 12px;
}

.drawer-icon-btn {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.35);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #181b22;
}

.drawer-icon-btn .material-symbols-outlined {
  font-size: 1rem;
  line-height: 1;
}

.drawer-content {
  padding: 4px 18px 18px;
  overflow-y: auto;
  flex: 1;
  scrollbar-width: none;
}

.drawer-content::-webkit-scrollbar {
  width: 0;
  height: 0;
}

.drawer-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.drawer-top h3 {
  margin: 0;
  font-size: 1rem;
  color: #181b22;
}

.result-pill {
  padding: 8px 10px;
  border-radius: 999px;
  font-size: 0.72rem;
  font-weight: 700;
  white-space: nowrap;
  background: rgba(58, 74, 112, 0.14);
  color: #35508f;
}

.result-block {
  background: rgba(247, 249, 252, 0.9);
  border: 1px solid rgba(226, 232, 240, 0.95);
  border-radius: 18px;
  padding: 13px 14px;
  margin-bottom: 10px;
}

.result-label {
  margin: 0 0 6px;
  font-size: 0.74rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #747d89;
}

.result-text {
  margin: 0;
  font-size: 0.9rem;
  line-height: 1.55;
  color: #1f232b;
}

.result-list {
  margin: 0;
  padding-left: 18px;
  color: #1f232b;
}

.result-list li {
  margin-bottom: 8px;
  font-size: 0.9rem;
  line-height: 1.5;
}

.empty-state {
  display: none;
  border-radius: 22px;
  padding: 16px;
  background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: rgba(255,255,255,0.8);
  font-size: 0.88rem;
  line-height: 1.45;
}

.empty-state.show {
  display: block;
}

.bottom-nav {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  width: 240px;
  height: 58px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(28px) saturate(190%);
  -webkit-backdrop-filter: blur(28px) saturate(190%);
  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow:
    inset 0 1px 1px rgba(255, 255, 255, 0.65),
    inset 0 -1px 1px rgba(255, 255, 255, 0.2),
    0 10px 30px rgba(0, 0, 0, 0.12);
  z-index: 40;
  transition: all 0.35s cubic-bezier(.22, 1, .36, 1);
}

.bottom-nav::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(
    to bottom,
    rgba(255, 255, 255, 0.45),
    rgba(255, 255, 255, 0.08)
  );
  pointer-events: none;
}

.nav-item {
  width: 58px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  text-decoration: none;
  position: relative;
  z-index: 1;
}

.nav-icon-wrap {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  transition:
    background 0.25s ease,
    box-shadow 0.25s ease,
    transform 0.25s ease;
}

.nav-icon-wrap .material-symbols-outlined {
  color: rgba(255, 255, 255, 0.88);
  font-size: 22px;
  line-height: 1;
  transition: color 0.25s ease;
}

.nav-item:hover .nav-icon-wrap {
  transform: translateY(-1px);
}

.nav-item.active .nav-icon-wrap {
  background: rgba(35, 40, 50, 0.15);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow:
    inset 0 1px 2px rgba(255, 255, 255, 0.18),
    0 6px 16px rgba(0, 0, 0, 0.25);
}

.nav-item.active .material-symbols-outlined {
  color: #ffffff;
}

@media (max-width: 420px) {
  .app-shell {
    padding: 0;
  }

  .phone {
    width: 100%;
    max-width: none;
    height: 100vh;
    border-radius: 0;
  }

  .results-drawer {
    bottom: 82px;
  }
}
.results-list .news-card {
  opacity: 0;
  transform: translateY(18px);
  transition:
    opacity 0.45s ease,
    transform 0.6s cubic-bezier(.19, 1, .22, 1),
    box-shadow 0.24s ease,
    background 0.24s ease;
}

.results-section.show-results .news-card:not(.hidden-card) {
  opacity: 1;
  transform: translateY(0);
}

.results-section.show-results .news-card:not(.hidden-card):nth-child(1) { transition-delay: 0.04s; }
.results-section.show-results .news-card:not(.hidden-card):nth-child(2) { transition-delay: 0.08s; }
.results-section.show-results .news-card:not(.hidden-card):nth-child(3) { transition-delay: 0.12s; }
.results-section.show-results .news-card:not(.hidden-card):nth-child(4) { transition-delay: 0.16s; }
.results-section.show-results .news-card:not(.hidden-card):nth-child(5) { transition-delay: 0.20s; }
.results-section.show-results .news-card:not(.hidden-card):nth-child(6) { transition-delay: 0.24s; } </style>
</head>
<body>
  <div class="app-shell">
    <div class="phone">
      <main class="page" id="newsPage">
        <div class="screen-inner">
          <div class="news-page">
            <header class="topbar">
              <h1 class="topbar-title">Search.</h1>

              <div class="topbar-actions-pill">
                <button type="button" class="glass-pill-btn" aria-label="Share">
                  <span class="material-symbols-outlined">share</span>
                </button>

                <span class="pill-divider"></span>

                <button type="button" class="glass-pill-btn" aria-label="More options">
                  <span class="material-symbols-outlined">more_horiz</span>
                </button>
              </div>
            </header>

            <section class="news-search-stage" id="newsSearchStage">
                <div class="search-center-wrap">
              
                  <div class="search-bubble" id="searchBubble">
                    <span class="material-symbols-outlined">search</span>
                    <input
                      type="text"
                      class="search-input"
                      id="newsSearchInput"
                      placeholder="Type keywords separated by commas"
                    />
                  </div>
              
                  <p class="helper-copy" id="helperCopy">
                    Search keywords to discover relevant articles.
                  </p>
                </div>
              </section>
              
              <section class="results-section" id="resultsSection">
                <div class="results-list" id="resultsList">
                  <button
                    type="button"
                    class="news-card hidden-card"
                    data-keywords="policy,bill,government,law"
                    data-headline="Bill timeline sparks confusion after officials describe vote as final passage"
                    data-source="The Civic Ledger"
                    data-date="2h ago"
                    data-summary="A closer look at the legislative timeline suggests the widely shared phrasing may have overstated the bill’s legal status."
                    data-details="This article breaks down how the bill moved through committee and why some public statements confused a chamber vote with final enactment."
                    data-points="Explains each procedural step clearly.|Separates committee approval from final passage.|Useful for understanding how wording changed public perception."
                  >
                    <div class="news-meta">
                      <span class="news-source">The Civic Ledger</span>
                      <span class="news-date">2h ago</span>
                    </div>
              
                    <div class="news-main">
                      <h3>Bill timeline sparks confusion after officials describe vote as final passage</h3>
                      <p>A closer look at the legislative timeline suggests the widely shared phrasing may have overstated the bill’s legal status.</p>
                    </div>
              
                    <span class="keyword-pill">policy, bill</span>
                  </button>
              
                  <button
                    type="button"
                    class="news-card hidden-card"
                    data-keywords="economy,jobs,unemployment"
                    data-headline="Unemployment claim draws mixed reaction as revised figures add context"
                    data-source="Public Wire"
                    data-date="4h ago"
                    data-summary="Analysts say the headline number alone misses recent revisions and regional variation."
                    data-details="The piece compares the original public claim to updated labor data and highlights which parts hold up and which need more nuance."
                    data-points="Includes recent revisions.|Shows national vs regional differences.|Helpful when evaluating broad jobs claims."
                  >
                    <div class="news-meta">
                      <span class="news-source">Public Wire</span>
                      <span class="news-date">4h ago</span>
                    </div>
              
                    <div class="news-main">
                      <h3>Unemployment claim draws mixed reaction as revised figures add context</h3>
                      <p>Analysts say the headline number alone misses recent revisions and regional variation.</p>
                    </div>
              
                    <span class="keyword-pill">economy</span>
                  </button>
              
                  <button
                    type="button"
                    class="news-card hidden-card"
                    data-keywords="study,health,research"
                    data-headline="New study goes viral, but experts say the methodology deserves a second look"
                    data-source="Research Desk"
                    data-date="6h ago"
                    data-summary="Experts caution that the study’s sample and framing are being simplified on social media."
                    data-details="This article reviews the study design, explains the limits of its sample, and shows how the strongest claims online go beyond the findings."
                    data-points="Summarizes core study methods.|Separates findings from online exaggeration.|Good for checking scientific claims quickly."
                  >
                    <div class="news-meta">
                      <span class="news-source">Research Desk</span>
                      <span class="news-date">6h ago</span>
                    </div>
              
                    <div class="news-main">
                      <h3>New study goes viral, but experts say the methodology deserves a second look</h3>
                      <p>Experts caution that the study’s sample and framing are being simplified on social media.</p>
                    </div>
              
                    <span class="keyword-pill">study, research</span>
                  </button>
              
                  <button
                    type="button"
                    class="news-card hidden-card"
                    data-keywords="election,voting,results"
                    data-headline="Officials clarify what election reporting dashboards can and cannot show in real time"
                    data-source="Metro Bulletin"
                    data-date="9h ago"
                    data-summary="Election administrators say many viral screenshots remove the data from its original reporting context."
                    data-details="The article explains what live dashboards track, how unofficial counts spread online, and why screenshots without labels create confusion."
                    data-points="Breaks down dashboard terminology.|Clarifies unofficial vs certified counts.|Useful for screenshot-based claims."
                  >
                    <div class="news-meta">
                      <span class="news-source">Metro Bulletin</span>
                      <span class="news-date">9h ago</span>
                    </div>
              
                    <div class="news-main">
                      <h3>Officials clarify what election reporting dashboards can and cannot show in real time</h3>
                      <p>Election administrators say many viral screenshots remove the data from its original reporting context.</p>
                    </div>
              
                    <span class="keyword-pill">election</span>
                  </button>
              
                  <button
                    type="button"
                    class="news-card hidden-card"
                    data-keywords="climate,policy,energy"
                    data-headline="Energy policy clip spreads widely after one phrase is pulled out of context"
                    data-source="Signal News"
                    data-date="11h ago"
                    data-summary="The longer interview adds nuance that is missing from the viral excerpt."
                    data-details="Signal News republishes the full remarks and notes how one short phrase altered the perceived meaning of the policy position."
                    data-points="Includes full quote context.|Shows how clip framing changed interpretation.|Helpful for quote verification."
                  >
                    <div class="news-meta">
                      <span class="news-source">Signal News</span>
                      <span class="news-date">11h ago</span>
                    </div>
              
                    <div class="news-main">
                      <h3>Energy policy clip spreads widely after one phrase is pulled out of context</h3>
                      <p>The longer interview adds nuance that is missing from the viral excerpt.</p>
                    </div>
              
                    <span class="keyword-pill">climate</span>
                  </button>
              
                  <button
                    type="button"
                    class="news-card hidden-card"
                    data-keywords="technology,ai,regulation"
                    data-headline="Regulators respond after AI system summary is mistaken for an official ruling"
                    data-source="Today Brief"
                    data-date="1d ago"
                    data-summary="A circulating screenshot was widely interpreted as a final rule, but agency records tell a different story."
                    data-details="The report compares the screenshot against the agency docket and explains how a draft or summary became confused with binding guidance."
                    data-points="Differentiates summary vs ruling.|Points to official document trail.|Helpful for regulation-related claims."
                  >
                    <div class="news-meta">
                      <span class="news-source">Today Brief</span>
                      <span class="news-date">1d ago</span>
                    </div>
              
                    <div class="news-main">
                      <h3>Regulators respond after AI system summary is mistaken for an official ruling</h3>
                      <p>A circulating screenshot was widely interpreted as a final rule, but agency records tell a different story.</p>
                    </div>
              
                    <span class="keyword-pill">technology, ai</span>
                  </button>
                </div>
              
                <div class="empty-state" id="emptyState">
                  No articles matched those keywords. Try broader terms or separate topics with commas.
                </div>
              </section>

          </div>
        </div>
      </main>

      <aside class="results-drawer hidden" id="resultsDrawer" aria-label="News details drawer">
        <div class="drawer-handle-zone" id="drawerHandle">
          <span class="drag-line"></span>
        </div>

        <div class="drawer-header-row">
          <button type="button" class="drawer-icon-btn" id="drawerClose" aria-label="Close">
            <span class="material-symbols-outlined">close</span>
          </button>

          <button type="button" class="drawer-icon-btn" id="drawerExpand" aria-label="Expand">
            <span class="material-symbols-outlined">open_in_full</span>
          </button>
        </div>

        <div class="drawer-content">
          <div class="drawer-top">
            <h3 id="drawerTitle">Article details</h3>
            <span class="result-pill" id="drawerSourcePill">Source</span>
          </div>

          <div class="result-block">
            <p class="result-label">Headline</p>
            <p class="result-text" id="drawerHeadline"></p>
          </div>

          <div class="result-block">
            <p class="result-label">Summary</p>
            <p class="result-text" id="drawerSummary"></p>
          </div>

          <div class="result-block">
            <p class="result-label">Source information</p>
            <ul class="result-list" id="drawerDetails"></ul>
          </div>
        </div>
      </aside>

      <nav class="bottom-nav" id="bottomNav">
        <a class="nav-item" href="home.html" aria-label="Home">
          <div class="nav-icon-wrap">
            <span class="material-symbols-outlined">home</span>
          </div>
        </a>

        <a class="nav-item" href="audio.html" aria-label="Audio">
          <div class="nav-icon-wrap">
            <span class="material-symbols-outlined">mic</span>
          </div>
        </a>

        <a class="nav-item" href="video.html" aria-label="Video">
          <div class="nav-icon-wrap">
            <span class="material-symbols-outlined">videocam</span>
          </div>
        </a>

        <a class="nav-item active" href="news.html" aria-label="News">
          <div class="nav-icon-wrap">
            <span class="material-symbols-outlined">article</span>
          </div>
        </a>
      </nav>
    </div>
  </div>

  <script>
    (() => {
      const searchInput = document.getElementById("newsSearchInput");
      const cards = Array.from(document.querySelectorAll(".news-card"));
      const emptyState = document.getElementById("emptyState");
      const searchStage = document.getElementById("newsSearchStage");
      const resultsSection = document.getElementById("resultsSection");
  
      const drawer = document.getElementById("resultsDrawer");
      const handle = document.getElementById("drawerHandle");
      const closeBtn = document.getElementById("drawerClose");
      const expandBtn = document.getElementById("drawerExpand");
  
      const drawerSourcePill = document.getElementById("drawerSourcePill");
      const drawerHeadline = document.getElementById("drawerHeadline");
      const drawerSummary = document.getElementById("drawerSummary");
      const drawerDetails = document.getElementById("drawerDetails");
  
      if (!searchInput || !drawer || !handle) return;
  
      let startY = 0;
      let startHeight = 220;
      let currentHeight = 220;
      let dragging = false;
  
      const collapsedHeight = 220;
      const midHeight = 380;
      const expandedHeight = 620;
  
      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
  
      const setHeight = (value) => {
        currentHeight = clamp(value, collapsedHeight, expandedHeight);
        drawer.style.height = currentHeight + "px";
      };
  
      const openDrawer = () => {
        drawer.classList.remove("hidden");
        setHeight(collapsedHeight);
      };
  
      const closeDrawer = () => {
        drawer.classList.add("hidden");
      };
  
      const populateDrawer = (card) => {
        const headline = card.dataset.headline || "";
        const source = card.dataset.source || "";
        const date = card.dataset.date || "";
        const summary = card.dataset.summary || "";
        const details = (card.dataset.points || "").split("|").filter(Boolean);
        const longDetail = card.dataset.details || "";
  
        drawerSourcePill.textContent = source;
        drawerHeadline.textContent = headline;
        drawerSummary.textContent = summary;
  
        drawerDetails.innerHTML = "";
  
        const metaItem = document.createElement("li");
        metaItem.textContent = `${source} • ${date}`;
        drawerDetails.appendChild(metaItem);
  
        if (longDetail) {
          const detailItem = document.createElement("li");
          detailItem.textContent = longDetail;
          drawerDetails.appendChild(detailItem);
        }
  
        details.forEach((detail) => {
          const li = document.createElement("li");
          li.textContent = detail;
          drawerDetails.appendChild(li);
        });
      };
  
      const snapDrawer = () => {
        const distToCollapsed = Math.abs(currentHeight - collapsedHeight);
        const distToMid = Math.abs(currentHeight - midHeight);
        const distToExpanded = Math.abs(currentHeight - expandedHeight);
  
        if (distToCollapsed <= distToMid && distToCollapsed <= distToExpanded) {
          setHeight(collapsedHeight);
        } else if (distToMid <= distToExpanded) {
          setHeight(midHeight);
        } else {
          setHeight(expandedHeight);
        }
      };
  
      const onPointerMove = (e) => {
        if (!dragging) return;
        const deltaY = startY - e.clientY;
        const nextHeight = startHeight + deltaY;
        setHeight(nextHeight);
      };
  
      const endDrag = () => {
        if (!dragging) return;
        dragging = false;
        drawer.classList.remove("dragging");
  
        if (currentHeight < collapsedHeight + 20) {
          closeDrawer();
        } else {
          snapDrawer();
        }
  
        window.removeEventListener("pointermove", onPointerMove);
        window.removeEventListener("pointerup", endDrag);
      };
  
      handle.addEventListener("pointerdown", (e) => {
        if (drawer.classList.contains("hidden")) return;
  
        dragging = true;
        startY = e.clientY;
        startHeight = currentHeight;
        drawer.classList.add("dragging");
        handle.setPointerCapture?.(e.pointerId);
        window.addEventListener("pointermove", onPointerMove);
        window.addEventListener("pointerup", endDrag);
      });
  
      expandBtn.addEventListener("click", () => {
        openDrawer();
        if (currentHeight < expandedHeight - 20) {
          setHeight(expandedHeight);
        } else {
          setHeight(collapsedHeight);
        }
      });
  
      closeBtn.addEventListener("click", closeDrawer);
  
      cards.forEach((card) => {
        card.addEventListener("click", () => {
          populateDrawer(card);
          openDrawer();
        });
      });
  
      function filterCards() {
        const raw = searchInput.value.trim().toLowerCase();
  
        const terms = raw
          .split(",")
          .map((term) => term.trim())
          .filter(Boolean);
  
        let visibleCount = 0;
  
        cards.forEach((card) => {
          const haystack = [
            card.dataset.keywords || "",
            card.dataset.headline || "",
            card.dataset.source || "",
            card.dataset.summary || "",
            card.textContent || ""
          ].join(" ").toLowerCase();
  
          const matches =
            terms.length > 0 &&
            terms.some((term) => haystack.includes(term));
  
          card.classList.toggle("hidden-card", !matches);
  
          if (matches) {
            visibleCount += 1;
          }
        });
  
        searchStage.classList.add("search-active");
        resultsSection.classList.add("show-results");
        emptyState.classList.toggle("show", visibleCount === 0);
      }
  
      searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          filterCards();
        }
      });
  
      drawer.classList.add("hidden");
    })();
  </script>
</body>
</html>
