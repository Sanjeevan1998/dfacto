<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0"
  >
  <link rel="stylesheet" href="styles.css">

  <style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  font-family: "Inter", sans-serif;
  background: #e8edf5;
  color: white;
}

body {
  min-height: 100vh;
}

button,
input,
a {
  font: inherit;
}

button {
  border: none;
}

a {
  text-decoration: none;
  color: inherit;
}

.app-shell {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 28px 16px;
}

.phone {
  width: 390px;
  max-width: 100%;
  height: 844px;
  background: #000;
  border-radius: 34px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow:
    0 30px 90px rgba(0, 0, 0, 0.45),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(16px);
}

.page {
  position: absolute;
  inset: 0;
}

.screen-inner {
  height: 100%;
  overflow-y: auto;
  padding: 22px 20px 128px;
  scrollbar-width: none;
}

.screen-inner::-webkit-scrollbar {
  width: 0;
  height: 0;
}

.audio-page {
  display: flex;
  flex-direction: column;
  gap: 18px;
  min-height: 100%;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 20;
  padding-bottom: 8px;
  background: transparent;
}

.topbar-title {
  margin: 0;
  font-size: 1.85rem;
  line-height: 1;
  letter-spacing: -0.03em;
  color: white;
  font-weight: 700;
}

.hero-copy {
  display: none;
}

.topbar-actions-pill {
  margin-left: auto;
  height: 44px;
  display: inline-flex;
  align-items: center;
  padding: 0 6px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.22);
  backdrop-filter: blur(16px) saturate(160%);
  -webkit-backdrop-filter: blur(16px) saturate(160%);
  box-shadow:
    inset 0 1px 1px rgba(255, 255, 255, 0.55),
    0 8px 24px rgba(31, 35, 43, 0.1);
}

.glass-pill-btn {
  width: 40px;
  height: 40px;
  background: transparent;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  cursor: pointer;
  transition:
    transform 0.24s cubic-bezier(.22, 1, .36, 1),
    background 0.24s ease;
}

.glass-pill-btn:hover {
  background: rgba(255, 255, 255, 0.12);
}

.glass-pill-btn:active {
  transform: scale(0.96);
}

.glass-pill-btn .material-symbols-outlined {
  font-size: 1.2rem;
  line-height: 1;
  color: white;
}

.pill-divider {
  width: 1px;
  height: 20px;
  background: rgba(255, 255, 255, 0.25);
  margin: 0 2px;
}

.transcript-panel {
  border-radius: 28px;
  padding: 16px;
  display: grid;
  gap: 12px;
}

.panel-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}

.panel-head h2 {
  margin: 0;
  font-size: 1rem;
  line-height: 1.2;
  color: white;
}

.status-pill {
  padding: 8px 10px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.12);
  color: white;
  font-size: 0.74rem;
  font-weight: 700;
  white-space: nowrap;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.transcript-list {
  display: grid;
  gap: 12px;
  padding-bottom: 160px;
}

.transcript-line {
  width: 100%;
  display: grid;
  grid-template-columns: 52px 1fr;
  gap: 12px;
  align-items: start;
  text-align: left;
  border-radius: 18px;
  padding: 12px;
  cursor: pointer;
  background: rgba(255, 255, 255, 0.22);
  backdrop-filter: blur(16px) saturate(160%);
  -webkit-backdrop-filter: blur(16px) saturate(160%);
  box-shadow:
    inset 0 1px 1px rgba(255, 255, 255, 0.55),
    0 8px 24px rgba(31, 35, 43, 0.1);
  transition:
    transform 0.24s ease,
    box-shadow 0.24s ease,
    background 0.24s ease;
}

.transcript-line:hover {
  transform: translateY(-1px);
  box-shadow:
    inset 0 1px 1px rgba(255, 255, 255, 0.55),
    0 12px 28px rgba(31, 35, 43, 0.16);
}

.transcript-line:active {
  transform: scale(0.99);
}

.transcript-main {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-width: 0;
}

.time-stamp {
  font-size: 0.76rem;
  font-weight: 700;
  color: rgba(255, 255, 255, 0.75);
  padding-top: 2px;
}

.transcript-line p {
  margin: 0;
  font-size: 0.9rem;
  line-height: 1.52;
  color: white;
}

.check-pill {
  width: fit-content;
  align-self: flex-end;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 0.7rem;
  font-weight: 700;
  line-height: 1;
}

.check-pill.true {
  background: rgba(72, 214, 123, 0.24);
  color: #aff5c8;
}

.check-pill.false {
  background: rgba(255, 83, 83, 0.24);
  color: #ffb1b1;
}

.check-pill.mixed {
  background: rgba(255, 204, 82, 0.22);
  color: #ffe08b;
}

.results-drawer {
  position: absolute;
  left: 12px;
  right: 12px;
  bottom: 88px;
  height: 220px;
  max-height: 620px;
  background: rgba(255, 255, 255, 0.55);
  border: 1px solid rgba(255, 255, 255, 0.52);
  border-radius: 28px;
  backdrop-filter: blur(20px) saturate(165%);
  -webkit-backdrop-filter: blur(20px) saturate(165%);
  box-shadow:
    0 -10px 32px rgba(20, 25, 36, 0.1),
    inset 0 1px 0 rgba(255, 255, 255, 0.44);
  z-index: 30;
  user-select: none;
  overflow: hidden;
  transition:
    height 0.34s cubic-bezier(.22, 1, .36, 1),
    opacity 0.22s ease,
    transform 0.22s ease;
  display: flex;
  flex-direction: column;
  opacity: 1;
  transform: translateY(0);
}

.results-drawer.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(18px);
}

.results-drawer.dragging {
  transition: none;
}

.drawer-handle-zone {
  padding: 10px 0 8px;
  display: flex;
  justify-content: center;
  cursor: grab;
  flex-shrink: 0;
}

.results-drawer.dragging .drawer-handle-zone {
  cursor: grabbing;
}

.drag-line {
  width: 44px;
  height: 5px;
  border-radius: 999px;
  background: #bcc6d4;
}

.drawer-header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 14px 6px;
  gap: 12px;
}

.drawer-icon-btn {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.35);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #181b22;
}

.drawer-icon-btn .material-symbols-outlined {
  font-size: 1rem;
  line-height: 1;
}

.drawer-content {
  padding: 4px 18px 18px;
  overflow-y: auto;
  flex: 1;
  scrollbar-width: none;
}

.drawer-content::-webkit-scrollbar {
  width: 0;
  height: 0;
}

.drawer-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.drawer-top h3 {
  margin: 0;
  font-size: 1rem;
  color: #181b22;
}

.result-pill {
  padding: 8px 10px;
  border-radius: 999px;
  font-size: 0.72rem;
  font-weight: 700;
  white-space: nowrap;
}

.result-pill.true {
  background: rgba(41, 190, 100, 0.16);
  color: #1c7c45;
}

.result-pill.false {
  background: rgba(255, 83, 83, 0.16);
  color: #aa2d2d;
}

.result-pill.mixed {
  background: rgba(255, 204, 82, 0.16);
  color: #8d6300;
}

.result-block {
  background: rgba(247, 249, 252, 0.9);
  border: 1px solid rgba(226, 232, 240, 0.95);
  border-radius: 18px;
  padding: 13px 14px;
  margin-bottom: 10px;
}

.result-label {
  margin: 0 0 6px;
  font-size: 0.74rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #747d89;
}

.result-text {
  margin: 0;
  font-size: 0.9rem;
  line-height: 1.55;
  color: #1f232b;
}

.result-list {
  margin: 0;
  padding-left: 18px;
  color: #1f232b;
}

.result-list li {
  margin-bottom: 8px;
  font-size: 0.9rem;
  line-height: 1.5;
}

.page-exit {
  opacity: 0;
  transform: scale(0.985);
  transition: opacity 0.28s ease, transform 0.28s ease;
}

@media (max-width: 420px) {
  .app-shell {
    padding: 0;
  }

  .phone {
    width: 100%;
    max-width: none;
    height: 100vh;
    border-radius: 0;
  }

  .results-drawer {
    bottom: 82px;
  }
}
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="phone">
      <main class="page" id="audioPage">
        <div class="screen-inner">
          <div class="audio-page">
            <header class="topbar">
                <h1 class="topbar-title">Listen.</h1>
              
                <div class="topbar-actions-pill">
                  <button type="button" class="glass-pill-btn" aria-label="Share">
                    <span class="material-symbols-outlined">share</span>
                  </button>
              
                  <span class="pill-divider"></span>
              
                  <button type="button" class="glass-pill-btn" aria-label="More options">
                    <span class="material-symbols-outlined">more_horiz</span>
                  </button>
                </div>
              </header>


            <section class="transcript-panel">
              <div class="panel-head">
                <h2>Live Transcription</h2>
                <span class="status-pill">Synced</span>
              </div>

             
              <div class="transcript-list">
                <button
                  type="button"
                  class="transcript-line checked mixed"
                  data-verdict="Needs context"
                  data-claim="The speaker says the bill officially passed last week."
                  data-assessment="This appears to mix up a legislative step with final passage into law. The statement may be partially true, but it is incomplete and potentially misleading without additional context."
                  data-reasons="The statement uses definitive language like officially passed.|The timeline may refer to a chamber vote rather than final enactment.|The legal status needs further verification before confirming truthfulness."
                >
                  <span class="time-stamp">00:02</span>
                  <div class="transcript-main">
                    <p>The speaker says the bill officially passed last week.</p>
                    <span class="check-pill mixed">Mixed</span>
                  </div>
                </button>
              
                <button
                  type="button"
                  class="transcript-line checked true"
                  data-verdict="Verified"
                  data-claim="The claim references a recent government action and implies it is already law."
                  data-assessment="This statement is broadly accurate based on the referenced transcript context."
                  data-reasons="Core event description matches the audio.|The timing language is consistent.|No major contradiction detected."
                >
                  <span class="time-stamp">00:07</span>
                  <div class="transcript-main">
                    <p>The claim references a recent government action and implies it is already law.</p>
                    <span class="check-pill true">True</span>
                  </div>
                </button>
              
                <button
                  type="button"
                  class="transcript-line checked false"
                  data-verdict="False"
                  data-claim="DFacto detects a timing and legal-status inconsistency in the statement."
                  data-assessment="The original speaker statement conflicts with the verified status of the event and should not be presented as settled fact."
                  data-reasons="Claim overstates certainty.|Supporting evidence does not confirm final legal status.|Timeline language is inaccurate."
                >
                  <span class="time-stamp">00:11</span>
                  <div class="transcript-main">
                    <p>DFacto detects a timing and legal-status inconsistency in the statement.</p>
                    <span class="check-pill false">False</span>
                  </div>
                </button>
              
                <button
                  type="button"
                  class="transcript-line checked mixed"
                  data-verdict="Needs context"
                  data-claim="The app cross-checks whether the event was a vote, approval step, or final enactment."
                  data-assessment="The event description may refer to one step in a longer legislative process, so additional context is required."
                  data-reasons="Multiple stages can be confused.|The statement lacks procedural specificity.|Outcome wording may be premature."
                >
                  <span class="time-stamp">00:16</span>
                  <div class="transcript-main">
                    <p>The app cross-checks whether the event was a vote, approval step, or final enactment.</p>
                    <span class="check-pill mixed">Mixed</span>
                  </div>
                </button>
              </div>
            </section>
          </div>
        </div>
      </main>

      <aside class="results-drawer hidden" id="resultsDrawer" aria-label="Results drawer">
        <div class="drawer-handle-zone" id="drawerHandle">
          <span class="drag-line"></span>
        </div>
      
        <div class="drawer-header-row">
          <button type="button" class="drawer-icon-btn" id="drawerClose" aria-label="Close">
            <span class="material-symbols-outlined">close</span>
          </button>
      
          <button type="button" class="drawer-icon-btn" id="drawerExpand" aria-label="Expand">
            <span class="material-symbols-outlined">open_in_full</span>
          </button>
        </div>
      
        <div class="drawer-content">
          <div class="drawer-top">
            <h3 id="drawerTitle">Results</h3>
            <span class="result-pill" id="drawerVerdict">Needs context</span>
          </div>
      
          <div class="result-block">
            <p class="result-label">Claim reviewed</p>
            <p class="result-text" id="drawerClaim"></p>
          </div>
      
          <div class="result-block">
            <p class="result-label">Assessment</p>
            <p class="result-text" id="drawerAssessment"></p>
          </div>
      
          <div class="result-block">
            <p class="result-label">Why it was flagged</p>
            <ul class="result-list" id="drawerReasons"></ul>
          </div>
        </div>
      </aside>

      <nav class="bottom-nav" id="bottomNav">
        <a class="nav-item" href="home.html" aria-label="Home">
          <div class="nav-icon-wrap">
            <span class="material-symbols-outlined">home</span>
          </div>
        </a>

        <a class="nav-item active" href="audio.html" aria-label="Audio">
          <div class="nav-icon-wrap">
            <span class="material-symbols-outlined">mic</span>
          </div>
        </a>

        <a class="nav-item" href="video.html" aria-label="Video">
          <div class="nav-icon-wrap">
            <span class="material-symbols-outlined">videocam</span>
          </div>
        </a>

        <a class="nav-item" href="news.html" aria-label="News">
          <div class="nav-icon-wrap">
            <span class="material-symbols-outlined">article</span>
          </div>
        </a>
      </nav>
    </div>
  </div>
  
  <script>
    (() => {
      const drawer = document.getElementById("resultsDrawer");
      const handle = document.getElementById("drawerHandle");
      const closeBtn = document.getElementById("drawerClose");
      const expandBtn = document.getElementById("drawerExpand");
      const transcriptCards = document.querySelectorAll(".transcript-line");
  
      const drawerVerdict = document.getElementById("drawerVerdict");
      const drawerClaim = document.getElementById("drawerClaim");
      const drawerAssessment = document.getElementById("drawerAssessment");
      const drawerReasons = document.getElementById("drawerReasons");
  
      if (!drawer || !handle) return;
  
      let startY = 0;
      let startHeight = 220;
      let currentHeight = 220;
      let dragging = false;
  
      const collapsedHeight = 220;
      const midHeight = 380;
      const expandedHeight = 620;
  
      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
  
      const setHeight = (value) => {
        currentHeight = clamp(value, collapsedHeight, expandedHeight);
        drawer.style.height = currentHeight + "px";
      };
  
      const openDrawer = () => {
        drawer.classList.remove("hidden");
        setHeight(collapsedHeight);
      };
  
      const closeDrawer = () => {
        drawer.classList.add("hidden");
      };
  
      const setVerdictClass = (el, verdictText) => {
        el.classList.remove("true", "false", "mixed");
        const v = verdictText.toLowerCase();
  
        if (v.includes("false")) el.classList.add("false");
        else if (v.includes("true") || v.includes("verified")) el.classList.add("true");
        else el.classList.add("mixed");
      };
  
      const populateDrawer = (card) => {
        const verdict = card.dataset.verdict || "Needs context";
        const claim = card.dataset.claim || "";
        const assessment = card.dataset.assessment || "";
        const reasons = (card.dataset.reasons || "").split("|").filter(Boolean);
  
        drawerVerdict.textContent = verdict;
        drawerClaim.textContent = claim;
        drawerAssessment.textContent = assessment;
  
        setVerdictClass(drawerVerdict, verdict);
  
        drawerReasons.innerHTML = "";
        reasons.forEach((reason) => {
          const li = document.createElement("li");
          li.textContent = reason;
          drawerReasons.appendChild(li);
        });
      };
  
      const snapDrawer = () => {
        const distToCollapsed = Math.abs(currentHeight - collapsedHeight);
        const distToMid = Math.abs(currentHeight - midHeight);
        const distToExpanded = Math.abs(currentHeight - expandedHeight);
  
        if (distToCollapsed <= distToMid && distToCollapsed <= distToExpanded) {
          setHeight(collapsedHeight);
        } else if (distToMid <= distToExpanded) {
          setHeight(midHeight);
        } else {
          setHeight(expandedHeight);
        }
      };
  
      const onPointerMove = (e) => {
        if (!dragging) return;
        const deltaY = startY - e.clientY;
        const nextHeight = startHeight + deltaY;
        setHeight(nextHeight);
      };
  
      const endDrag = () => {
        if (!dragging) return;
        dragging = false;
        drawer.classList.remove("dragging");
  
        if (currentHeight < collapsedHeight + 20) {
          closeDrawer();
        } else {
          snapDrawer();
        }
  
        window.removeEventListener("pointermove", onPointerMove);
        window.removeEventListener("pointerup", endDrag);
      };
  
      handle.addEventListener("pointerdown", (e) => {
        if (drawer.classList.contains("hidden")) return;
  
        dragging = true;
        startY = e.clientY;
        startHeight = currentHeight;
        drawer.classList.add("dragging");
        handle.setPointerCapture?.(e.pointerId);
        window.addEventListener("pointermove", onPointerMove);
        window.addEventListener("pointerup", endDrag);
      });
  
      expandBtn.addEventListener("click", () => {
        openDrawer();
        if (currentHeight < expandedHeight - 20) {
          setHeight(expandedHeight);
        } else {
          setHeight(collapsedHeight);
        }
      });
  
      closeBtn.addEventListener("click", closeDrawer);
  
      transcriptCards.forEach((card) => {
        card.addEventListener("click", () => {
          populateDrawer(card);
          openDrawer();
        });
      });
  
      drawer.classList.add("hidden");
    })();
  </script>
</body>
</html>
